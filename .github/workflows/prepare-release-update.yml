name: prepare formula update

on:
  repository_dispatch:
    types: [gitignore-in-release-published]
  workflow_dispatch:
    inputs:
      version:
        description: Released gitignore.in version tag (for example, v0.2.0)
        required: false
        type: string
      mode:
        description: Whether to open a PR or only rehearse the update
        required: false
        default: prepare-pr
        type: choice
        options:
          - prepare-pr
          - dry-run
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      mode: ${{ steps.resolve.outputs.mode }}
    steps:
      - name: Resolve inputs
        id: resolve
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ inputs.version }}
          DISPATCH_MODE: ${{ github.event.client_payload.mode }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          version="${DISPATCH_VERSION:-$INPUT_VERSION}"
          mode="${DISPATCH_MODE:-${INPUT_MODE:-prepare-pr}}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"

  validate:
    runs-on: ${{ matrix.macos }}
    needs: resolve
    strategy:
      matrix:
        macos: [macos-15-intel, macos-15]
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate formula
        env:
          GITIGNORE_IN_VERSION: ${{ needs.resolve.outputs.version }}
        run: ./generate.sh

      - name: Validate formula installation
        run: |
          brew install --formula ./gitignore-in.rb
          gitignore.in --help >/dev/null

        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
          HOMEBREW_NO_INSTALL_CLEANUP: '1'
          HOMEBREW_NO_ENV_HINTS: '1'

  prepare-update:
    runs-on: ubuntu-latest
    needs: [resolve, validate]
    if: ${{ needs.resolve.outputs.mode != 'dry-run' }}
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate formula
        env:
          GITIGNORE_IN_VERSION: ${{ needs.resolve.outputs.version }}
        run: ./generate.sh

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-gitignore-in-formula
          delete-branch: true
          commit-message: Update gitignore.in formula
          title: Update gitignore.in formula
          body: |
            Prepare the Homebrew formula for the latest gitignore.in release.

            - regenerated `gitignore-in.rb`
